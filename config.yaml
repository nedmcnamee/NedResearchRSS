research_profile:
  tier1_keywords:
    - DIA-MS
    - data-independent acquisition
    - cancer proteomics
    - foundation model
    - federated learning
    - synthetic lethality
    - multi-omics integration
    - ProCan
  tier2_keywords:
    - mass spectrometry
    - label-free quantification
    - cancer cell lines
    - drug response prediction
    - self-supervised learning
    - CRISPR screen
    - pan-cancer
    - transfer learning
    - multimodal learning
  tier3_keywords:
    - proteogenomics
    - single-cell proteomics
    - transformer
    - deep learning
    - cancer genomics
    - biomarker discovery
    - clinical proteomics
    - protein language model

scoring:
  model: sentence-transformers/all-MiniLM-L6-v2
  # Lower than v1 (0.25/0.75) because recency weighting shrinks the per-reference
  # weighted similarities — we need a lower floor/ceiling to keep the score range usable.
  nn_sim_low: 0.18      # cosine floor mapped to 0
  nn_sim_high: 0.65     # cosine ceiling mapped to 100
  weights:
    nn: 0.7
    keyword: 0.3
  tiers:
    # Lowered from 60/30: with LLM rerank blending (0.5 stage1 + 0.5 llm) the final
    # score range is compressed, so the old 60 threshold starves the must-read tier.
    high: 50
    medium: 25
  # Recency weighting: each reference paper's contribution is multiplied by
  #   max(0.5 ** (years_since_added / half_life), floor)
  # before taking the max cosine. Uses Paperpile's `created` (added-to-library) date,
  # not the paper's publication year.
  recency_half_life_years: 5
  recency_floor: 0.2

  # Optional second-stage LLM rerank.
  # Set enabled=true and export ANTHROPIC_API_KEY (locally) or add it as a GitHub
  # secret (CI). Without the key the pipeline still runs and just skips the LLM stage.
  llm_rerank:
    enabled: true                        # opt-in
    model: claude-sonnet-4-6              # default; switch to claude-haiku-4-5 for ~3x cheaper
    # Weekly runs produce fewer papers per run than daily — score everything so the
    # LLM judgment applies across the full feed, not just the medium+high tier.
    # Cost at Sonnet rates with ~200 papers/week ≈ $0.30/week.
    apply_to_min_score: 0
    blend_weight: 0.5                     # 0.5 stage1 + 0.5 llm = final
    cache_path: data/llm_cache.json       # disk cache, keyed by paper id + model + kb hash
    max_concurrent: 5                     # limit parallel API calls
    # profile_brief is used only as a fallback when data/knowledgebase.md is absent.
    profile_brief: |
      DIA mass spectrometry proteomics, cancer cell line and patient drug response,
      foundation models and multimodal learning for biology and pathology,
      federated learning, multi-omics integration, synthetic lethality.

library:
  path: data/library.json
  cache: data/reference.npz
  meta: data/reference_meta.json

fetch:
  # Weekly cadence: show the last 10 days of papers (7 days since last run + 3-day buffer
  # for late-published papers and to cover the occasional missed cron).
  lookback_days: 10
  max_papers_per_feed: 100
  # User-Agent sent with RSS requests (some publishers reject default python-urllib UA)
  user_agent: "SimonResearchRSS/0.1 (+https://github.com/)"
  request_timeout: 30

feeds:
  # Tier-1 journals (big venues the user explicitly wants prominent)
  - {name: Nature,                      url: "https://www.nature.com/nature.rss"}
  - {name: Nature Methods,              url: "https://www.nature.com/nmeth.rss"}
  - {name: Nature Biotechnology,        url: "https://www.nature.com/nbt.rss"}
  - {name: Nature Medicine,             url: "https://www.nature.com/nm.rss"}
  - {name: Nature Communications,       url: "https://www.nature.com/ncomms.rss"}
  - {name: Nature Machine Intelligence, url: "https://www.nature.com/natmachintell.rss"}
  - {name: Nature Cancer,               url: "https://www.nature.com/natcancer.rss"}
  - {name: Nature Reviews Cancer,       url: "https://www.nature.com/nrc.rss"}
  - {name: Cell,                        url: "https://www.cell.com/cell/inpress.rss"}
  - {name: Cancer Cell,                 url: "https://www.cell.com/cancer-cell/inpress.rss"}
  - {name: Molecular Cell,              url: "https://www.cell.com/molecular-cell/inpress.rss"}

  # bioRxiv subject feeds
  - {name: bioRxiv Cancer Biology,   url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=cancer_biology"}
  - {name: bioRxiv Bioinformatics,   url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=bioinformatics"}
  - {name: bioRxiv Systems Biology,  url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=systems_biology"}
  - {name: bioRxiv Biochemistry,     url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=biochemistry"}
