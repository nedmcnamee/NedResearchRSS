research_profile:
  tier1_keywords:
    - biomarker discovery
    - clinical proteomics
    - antibody drug conjugate biomarkers
    - spatial pathology
    - spatial biomarkers
    - ADC biomarkers
    - multi-omics integration
    - ProCan
  tier2_keywords:
    - mass spectrometry
    - label-free quantification
    - cancer cell lines
    - drug response prediction
    - self-supervised learning
    - CRISPR screen
    - pan-cancer
    - transfer learning
    - multimodal learning
    - DIA-MS
    - data-independent acquisition
    - cancer proteomics
    - foundation model
    - federated learning
    - synthetic lethality
  tier3_keywords:
    - proteogenomics
    - single-cell proteomics
    - transformer
    - deep learning
    - cancer genomics
    - protein language model

scoring:
  model: sentence-transformers/all-MiniLM-L6-v2
  # Lower than v1 (0.25/0.75) because recency weighting shrinks the per-reference
  # weighted similarities — we need a lower floor/ceiling to keep the score range usable.
  nn_sim_low: 0.18      # cosine floor mapped to 0
  nn_sim_high: 0.65     # cosine ceiling mapped to 100
  weights:
    nn: 0.7
    keyword: 0.3
  tiers:
    # Rank-based caps + score floors: each week the top-scoring papers fill the
    # tiers up to `max_count`, but a paper only qualifies if its final_score
    # clears `min_score`. Everything that doesn't fit any tier is DROPPED from
    # docs/papers.json entirely. The dashboard shows ~90 curated papers per week.
    #
    # Tune max_count to resize the dashboard; tune min_score to protect against
    # weak weeks (e.g. raise high.min_score to stop promoting mediocre papers
    # into must-read when there aren't 10 strong candidates).
    high:
      max_count: 10
      min_score: 40
    medium:
      max_count: 30
      min_score: 30
    low:
      max_count: 50
      min_score: 22
  # Recency weighting: each reference paper's contribution is multiplied by
  #   max(0.5 ** (years_since_added / half_life), floor)
  # before taking the max cosine. Uses Paperpile's `created` (added-to-library) date,
  # not the paper's publication year.
  recency_half_life_years: 5
  recency_floor: 0.2

  # Optional second-stage LLM rerank.
  # Set enabled=true and export ANTHROPIC_API_KEY (locally) or add it as a GitHub
  # secret (CI). Without the key the pipeline still runs and just skips the LLM stage.
  llm_rerank:
    enabled: true                        # opt-in
    # Switch models here. Options (April 2026):
    #   claude-haiku-4-5   — fastest + cheapest (~$1.20/month steady state)
    #   claude-sonnet-4-6  — smarter, ~3x cost (~$3.60/month)
    # Changing the model invalidates the LLM cache automatically, so the next
    # run re-scores every paper under the new model.
    model: claude-haiku-4-5
    # Weekly runs produce fewer papers per run than daily — score everything so the
    # LLM judgment applies across the full feed, not just the medium+high tier.
    # Cost at Sonnet rates with ~200 papers/week ≈ $0.30/week.
    apply_to_min_score: 0
    blend_weight: 0.5                     # 0.5 stage1 + 0.5 llm = final
    cache_path: data/llm_cache.json       # disk cache, keyed by paper id + model + kb hash
    max_concurrent: 1                     # limit parallel API calls
    # profile_brief is used only as a fallback when data/knowledgebase.md is absent.
    profile_brief: |
      Medical oncologist and PhD candidate focusing on antibody drug conjugate biomarkers. 
      Expertise in DIA-MS proteomics (ProCan), ADCs (HER2, TROP2, B7-H3), and 
      spatial computational pathology using foundation models and graph neural 
      networks to predict drug response in clinical cohorts.

# Admin features: paper ratings + manual paper addition.
# Only the admin (passphrase-authenticated) sees the rating UI and add-paper input.
# Ratings and queued papers are synced to the repo via the GitHub Contents API.
admin:
  # SHA-256 hex of the admin passphrase. Empty string disables admin mode.
  # To regenerate: python -c "import hashlib; print(hashlib.sha256(b'YOUR_PASSPHRASE').hexdigest())"
  passphrase_sha256: "4f37fc0c547aee7c62b86e2019e0e110c9cdee5fd19bbb5000bc883c334abfa7"
  # GitHub repo for the sync button (Contents API target).
  repo: nedmcnamee/NedResearchRSS

library:
  path: data/library.json
  cache: data/reference.npz
  meta: data/reference_meta.json

fetch:
  # Weekly cadence: show the last 10 days of papers (7 days since last run + 3-day buffer
  # for late-published papers and to cover the occasional missed cron).
  lookback_days: 10
  max_papers_per_feed: 100
  # User-Agent sent with RSS requests (some publishers reject default python-urllib UA)
  user_agent: "NedResearchRSS/0.1 (+https://github.com/)"
  request_timeout: 30

feeds:
  # Each feed may optionally set:
  #   weight:     multiplier applied to the paper's final_score before tier
  #               assignment (default 1.0). Lower weights demote noisy sources
  #               so they need a higher raw score to reach must-read. With
  #               high_tier=50 and weight=0.75, an arXiv paper needs raw >= 67
  #               to clear must-read, vs >= 50 for a weight=1.0 journal.
  #   max_papers: per-feed entry cap (default fetch.max_papers_per_feed=100).

  # Tier-1 journals (full weight — peer-reviewed, curated by editors)
  - {name: Nature,                      url: "https://www.nature.com/nature.rss"}
  - {name: Nature Methods,              url: "https://www.nature.com/nmeth.rss"}
  - {name: Nature Biotechnology,        url: "https://www.nature.com/nbt.rss"}
  - {name: Nature Medicine,             url: "https://www.nature.com/nm.rss"}
  - {name: Nature Communications,       url: "https://www.nature.com/ncomms.rss"}
  - {name: Nature Machine Intelligence, url: "https://www.nature.com/natmachintell.rss"}
  - {name: Nature Cancer,               url: "https://www.nature.com/natcancer.rss"}
  - {name: Nature Reviews Cancer,       url: "https://www.nature.com/nrc.rss"}
  - {name: Cell,                        url: "https://www.cell.com/cell/inpress.rss"}
  - {name: Cancer Cell,                 url: "https://www.cell.com/cancer-cell/inpress.rss"}
  - {name: Molecular Cell,              url: "https://www.cell.com/molecular-cell/inpress.rss"}
  - {name: Journal of Clinical Oncology, url: "https://ascopubs.org/action/showFeed?jc=jco&type=etoc&feed=rss"}
  - {name: Lancet Oncology, url: "https://www.thelancet.com/rssfeed/lanonc_current.xml"}
  - {name: Clinical Cancer Research, url: "https://aacrjournals.org/clincancerres/rss/current.xml"}

  # bioRxiv subject feeds — biology preprints, weight 0.76 so a bioRxiv paper
  # needs raw score ~66 to clear the must-read threshold (vs 50 for journals).
  # Tuned to target ~1/3 preprints in the must-read tier.
  - {name: bioRxiv Cancer Biology,   url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=cancer_biology", weight: 0.76}
  - {name: bioRxiv Bioinformatics,   url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=bioinformatics", weight: 0.76}
  - {name: bioRxiv Systems Biology,  url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=systems_biology", weight: 0.76}
  - {name: bioRxiv Biochemistry,     url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=biochemistry", weight: 0.76}

  # arXiv preprints — the cutting-edge ML firehose. cs.LG/cs.CV weighted
  # hardest (need raw score ~77 to reach must-read). q-bio.QM is closer to
  # this field so slightly kinder (needs raw ~69).
  - {name: "arXiv cs.LG (machine learning)",   url: "http://export.arxiv.org/api/query?search_query=cat:cs.LG&sortBy=submittedDate&sortOrder=descending&max_results=40", weight: 0.65, max_papers: 40}
  - {name: "arXiv cs.CV (vision / pathology)", url: "http://export.arxiv.org/api/query?search_query=cat:cs.CV&sortBy=submittedDate&sortOrder=descending&max_results=30", weight: 0.65, max_papers: 30}
  - {name: "arXiv q-bio.QM (comp biology)",    url: "http://export.arxiv.org/api/query?search_query=cat:q-bio.QM&sortBy=submittedDate&sortOrder=descending&max_results=40", weight: 0.72, max_papers: 40}
