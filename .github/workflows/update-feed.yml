name: Update Research Feed

on:
  schedule:
    # Weekly: Sunday 21:00 UTC = Monday 07:00 AEST (non-DST) / 08:00 AEDT (DST)
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write        # commit refreshed docs/ + reference cache back to main
  pages: write           # deploy the docs/ directory to GitHub Pages
  id-token: write        # required by actions/deploy-pages

concurrency:
  group: research-feed
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # need full history-less checkout but with write permission
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1
          restore-keys: |
            hf-all-MiniLM-L6-v2-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build reference index (skipped if library unchanged)
        run: python src/build_reference.py

      - name: Restore knowledgebase from secret
        env:
          KB_CONTENT: ${{ secrets.KB_CONTENT }}
        run: |
          if [ -n "$KB_CONTENT" ]; then
            mkdir -p data
            printf '%s' "$KB_CONTENT" > data/knowledgebase.md
            echo "Wrote data/knowledgebase.md ($(wc -c < data/knowledgebase.md) bytes)"
          else
            echo "KB_CONTENT secret is empty; LLM rerank will fall back to profile_brief"
          fi

      - name: Fetch + score
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/fetch_and_score.py

      - name: Generate dashboard
        run: python src/generate_dashboard.py

      - name: Commit refreshed data back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/papers.json docs/index.html data/reference.npz data/reference_meta.json
          # llm_cache.json may not exist if LLM rerank is disabled
          [ -f data/llm_cache.json ] && git add data/llm_cache.json || true
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: daily research feed update"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
